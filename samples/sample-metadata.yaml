title: 数字经济赋能区域产业升级的机制与效应研究：公开模板样例
subtitle: 天津财经大学博士毕业论文 LaTeX 到 DOCX 转换演示
author: 公开样例作者
student_id: 2026000000
school: 公开样例学院
