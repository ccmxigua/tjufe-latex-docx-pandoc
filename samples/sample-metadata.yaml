abstract:
  zh: |
    数字经济正在改变企业生产、要素配置与区域产业分工方式。为了展示天津财经大学博士毕业论文模板在 Word 文档中的基本版式效果，本文构造了一个完全公开、完全虚构的研究样例。样例覆盖标题层级、摘要关键词、正文段落、脚注、数学公式、图表、交叉引用、稳健性检验、结论建议、参考文献和致谢等论文元素。
    本样例不包含真实调研材料、真实数据库、真实回归结果或任何个人信息。所有变量名称、城市名称和数值均为占位内容，其目的只是帮助使用者检查 Pandoc、Lua filter 与 DOCX 后处理脚本的组合效果。
  en: |
    The digital economy is reshaping production, factor allocation, and regional industrial specialization. This document provides a fully public and entirely fictional dissertation-style sample for demonstrating the LaTeX-to-DOCX conversion workflow.
    This sample does not contain real survey materials, real databases, real empirical results, or personal information. All names, regions, variables, and numerical values are placeholders.
